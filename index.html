<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache">
<title>暗黑 · 温登调查档案</title>
<style>
:root{--bg:#121110;--card:#1a1815;--text:#c8c0b0;--text-dim:#7a7060;--amber:#d4a040;--dim-amber:#5a4020;--border:#2a2520;--input-bg:#1a1815;--soup-text:#b8a890;--red:#a05050;--green:#6a906a;--blue:#5a80a0}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:serif;min-height:100vh;line-height:1.9;font-size:17px}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent,transparent 30px,rgba(200,160,60,0.02) 30px,rgba(200,160,60,0.02) 32px);pointer-events:none;z-index:0}
#app{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:32px 24px 80px}
.scr{min-height:70vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;gap:24px}
.title{font-size:48px;font-weight:900;letter-spacing:12px;color:var(--amber)}
.btn{background:transparent;border:1px solid var(--amber);color:var(--amber);padding:14px 48px;font-family:monospace;font-size:14px;letter-spacing:5px;cursor:pointer;transition:.2s}
.btn:hover{background:rgba(212,160,64,0.15)}
.gm{display:none}
.progress{display:flex;justify-content:space-between;font-family:monospace;font-size:10px;color:var(--text-dim);letter-spacing:2px;margin-bottom:16px}
.phead{text-align:center;margin-bottom:24px}
.pnum{font-family:monospace;font-size:11px;color:var(--text-dim);letter-spacing:3px;margin-bottom:4px}
.ptitle{font-size:20px;color:var(--amber);letter-spacing:3px;font-weight:700}

.bowl{background:var(--card);border:1px solid var(--border);padding:30px 26px;margin-bottom:20px;line-height:2;color:var(--soup-text);position:relative}
.bowl::before{content:'案 卷';position:absolute;top:-13px;left:24px;background:var(--bg);padding:0 12px;font-family:monospace;font-size:10px;color:var(--amber);letter-spacing:4px}

/* Character cards */
.char-toggle{font-family:monospace;font-size:11px;color:var(--text-dim);letter-spacing:2px;cursor:pointer;margin-bottom:12px;display:inline-block;border-bottom:1px dashed var(--text-dim);padding-bottom:2px}
.char-toggle:hover{color:var(--amber);border-color:var(--amber)}
.char-panel{display:none;background:var(--card);border:1px solid var(--border);padding:16px 18px;margin-bottom:16px;border-radius:4px}
.char-panel.open{display:block}
.char-row{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid var(--border);align-items:center;font-size:14px}
.char-row:last-child{border:none}
.char-label{font-weight:700;color:var(--amber);min-width:80px;font-size:14px}
.char-name{color:var(--text);min-width:60px}
.char-note{color:var(--text-dim);font-size:13px}

/* Investigation */
.inv-section{margin-bottom:20px}
.inv-label{font-family:monospace;font-size:11px;color:var(--text-dim);letter-spacing:3px;margin-bottom:8px}
.inv-actions{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.inv-btn{flex:1;min-width:100px;background:var(--card);border:1px solid var(--border);color:var(--text-dim);padding:14px 10px;font-size:13px;font-family:inherit;cursor:pointer;transition:.2s;text-align:center;border-radius:4px}
.inv-btn:hover{border-color:var(--amber);color:var(--amber)}
.inv-btn .ico{display:block;font-size:22px;margin-bottom:4px}
.inv-btn .lbl{font-size:12px;font-family:monospace;letter-spacing:1px}
.inv-btn.used{opacity:0.25;pointer-events:none}
.inv-counter{font-family:monospace;font-size:10px;color:var(--text-dim);text-align:center;margin-bottom:12px}
.inv-counter span{color:var(--amber);font-size:14px}

.clue-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.clue{background:var(--card);border:1px solid var(--border);padding:12px 16px;font-size:15px;line-height:1.7;color:#a09888;animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.clue .clue-tag{display:inline-block;font-family:monospace;font-size:9px;padding:1px 6px;margin-right:6px;border-radius:2px}
.clue-tag.yes{background:rgba(100,160,100,0.15);color:#7ab87a}
.clue-tag.no{background:rgba(180,80,80,0.15);color:#c07070}
.clue-tag.irrelevant{background:rgba(120,120,120,0.1);color:#777}

/* Timeline */
.tl-section{display:none;margin-bottom:20px}
.tl-section.active{display:block}
.tl-label{font-family:monospace;font-size:11px;color:var(--amber);letter-spacing:3px;margin-bottom:10px}
.tl-hint{font-family:monospace;font-size:10px;color:var(--text-dim);margin-bottom:10px}
.tl-container{display:flex;flex-direction:column;gap:6px}
.tl-item{background:var(--card);border:1px solid var(--border);padding:14px 18px;font-size:15px;line-height:1.7;color:#b8a890;cursor:grab;border-radius:4px;transition:.2s;user-select:none;position:relative}
.tl-item:hover{border-color:var(--amber)}
.tl-item:active{cursor:grabbing;border-color:var(--amber);background:rgba(212,160,64,0.06)}
.tl-item.dragging{opacity:0.4;border-style:dashed}
.tl-item .tl-num{font-family:monospace;font-size:10px;color:var(--text-dim);margin-right:10px}
.tl-item.drag-over{border-color:var(--amber);border-style:dashed;background:rgba(212,160,64,0.04)}

/* Buttons */
.btn-submit{background:transparent;border:1px solid var(--amber);color:var(--amber);padding:10px 24px;font-family:monospace;font-size:12px;letter-spacing:3px;cursor:pointer;transition:.2s;margin-top:10px}
.btn-submit:hover{background:rgba(212,160,64,0.1)}
.tl-result{font-size:14px;margin-top:10px;padding:10px 0}
.tl-result.correct{color:var(--green)}
.tl-result.wrong{color:var(--red)}

/* Reveal */
.reveal{background:var(--card);border:1px solid var(--dim-amber);padding:20px 22px;margin:16px 0;font-size:17px;line-height:1.9;color:var(--soup-text);display:none}
.reveal::before{content:'调查结论';display:block;font-family:monospace;font-size:10px;color:var(--amber);letter-spacing:4px;margin-bottom:8px}
.nav-btns{display:flex;gap:10px;margin-top:8px}
.btn-n{flex:1;background:transparent;border:1px solid var(--amber);color:var(--amber);padding:14px;font-family:monospace;font-size:13px;letter-spacing:3px;cursor:pointer;transition:.2s}
.btn-n:hover{background:rgba(212,160,64,0.1)}
.btn-n.ghost{border-color:var(--border);color:var(--text-dim)}
.btn-n.ghost:hover{border-color:var(--amber);color:var(--amber)}

.pbar{position:fixed;bottom:0;left:0;width:100%;height:2px;background:var(--border);z-index:10}
.pfill{height:100%;background:var(--amber);transition:width .5s}
.complete{display:none;text-align:center;padding-top:40px}

@media(max-width:500px){.title{font-size:34px;letter-spacing:6px}#app{padding:20px 14px 60px}}
</style>
</head>
<body>
<div id="app">
<div class="scr" id="ns">
<div style="font-family:monospace;font-size:10px;color:var(--text-dim);letter-spacing:6px">W I N D E N</div>
<div class="title">暗 黑</div>
<div style="font-family:monospace;font-size:13px;color:var(--text-dim);letter-spacing:6px">—— D A R K ——</div>
<div style="font-size:14px;color:var(--text-dim);line-height:2;max-width:440px">你是温登镇的一名居民。孩子们开始失踪。乌鸦洞发出奇怪的声音。<br>有些事情不对劲。你知道的——虽然说不清楚。</div>
<button class="btn" id="btnGo">开始调查</button>
</div>

<div class="gm" id="gm">
<div class="progress"><span id="pt">温登镇</span><span id="pl"></span></div>
<div class="phead"><div class="pnum" id="pnum"></div><div class="ptitle" id="ptitle"></div></div>
<div class="bowl" id="bowl"></div>

<div class="char-toggle" id="charToggle" onclick="toggleChars()">▸ 查看涉案人物</div>
<div class="char-panel" id="charPanel"></div>

<div class="inv-section">
<div class="inv-label">▸ 调查行动 ｜ 剩余 <span id="invCount" style="color:var(--amber)">5</span> 次</div>
<div class="inv-actions" id="invActions"></div>
<div class="inv-counter">已收集线索: <span id="clueCount">0</span></div>
<div class="clue-list" id="clues"></div>
</div>

<div class="tl-section" id="tlSection">
<div class="tl-label">▸ 时间线重组</div>
<div class="tl-hint">将下方事件拖拽排序——然后提交</div>
<div class="tl-container" id="tlContainer"></div>
<button class="btn-submit" id="btnTimeline" onclick="checkTimeline()">确认排序</button>
<div class="tl-result" id="tlResult"></div>
</div>

<div class="reveal" id="reveal"></div>
<div class="nav-btns">
<button class="btn-n ghost" id="btnPrev" style="display:none" onclick="prevPuzzle()">◂ 上一案卷</button>
<button class="btn-n" id="btnNext" style="display:none" onclick="nextPuzzle()">下一案卷 ▸</button>
</div>
</div>

<div class="complete" id="cs">
<div style="font-size:28px;color:var(--amber);letter-spacing:6px;font-weight:700;margin-bottom:12px">调查完成</div>
<div class="bowl" id="statsBox" style="color:#c8c0b0"></div>
<button class="btn" id="btnRe" style="border-color:var(--border);color:var(--text-dim);font-size:12px;letter-spacing:4px;padding:12px 32px">重新开始</button>
</div></div>
<div class="pbar"><div class="pfill" id="pf"></div></div>

<script>
//==================== DATA ====================
var P=[];

// Helper: create clues with types
function w(q,kw,ans){return{q:q,kw:kw,t:'witness',a:'yes',ans:ans}}
function e(q,kw,ans){return{q:q,kw:kw,t:'evidence',a:'yes',ans:ans}}
function pl(q,kw,ans){return{q:q,kw:kw,t:'place',a:'yes',ans:ans}}
function wn(q,kw,ans){return{q:q,kw:kw,t:'witness',a:'no',ans:ans}}
function pn(q,kw,ans){return{q:q,kw:kw,t:'place',a:'no',ans:ans}}
function wi(q,kw,ans){return{q:q,kw:kw,t:'witness',a:'irrelevant',ans:ans}}

P.push({
n:'第一案卷',t:'森林中的男孩',
s:'<p>2019年11月4日,傍晚。温登高中学生米克尔在森林中失踪。父亲乌利希连夜组织搜索队。他们在乌鸦洞口找到了米克尔的背包——但没有脚印延伸进洞穴。</p><p>第二天,一具男孩尸体出现在森林里。法医鉴定:死亡不超过12小时。穿着像是80年代的人。<em>他的眼睛和米克尔一模一样。但DNA显示他不是米克尔。</em></p>',
chars:[{label:'失踪的儿子',name:'米克尔',note:'12岁,温登高中学生'},{label:'失踪者的父亲',name:'乌利希',note:'警察,愤怒的中年男人'},{label:'死者',name:'不明男孩',note:'穿着80年代的衣服,和米克尔长得极像'}],
clues:[
w('米克尔还活着吗?','米克尔 活着 还活着',ansYes('他活着——但不在2019年。他穿越到了1986年,被困在了那里。')),
w('死者和米克尔是什么关系?','关系 认识 血缘',ansYes('他们有血缘关系——他是米克尔的儿子。是的,12岁的米克尔是这个男孩的父亲。')),
w('这个男孩从哪来?','未来 来自 时间',ansYes('他来自2052年。米克尔穿越到1986年后长大结婚,生下了他。他为了寻找父亲也穿越了。')),
e('男孩为什么穿80年代的衣服?','衣服 80 年代',ansYes('他确实穿着1980年代的衣服。暗示他来自另一个时间——33年前。')),
e('这是第一起失踪案吗?','第一起 之前 还有',ansNo('不是。之前镇上已失踪至少两个孩子——埃里克和亚辛。还有1986年的玛兹。')),
e('凶手是谁?','凶手 杀 谋杀',ansNo('不是传统意义上的凶手。这些死亡和时间旅行实验有关——孩子们被用作测试对象。')),
pl('森林里有什么特殊的东西?','森林 洞穴 乌鸦',ansYes('乌鸦洞深处有一条通道——连接1953年、1986年和2019年。每33年开启一次。')),
pl('这件事和核电站有关吗?','核电站 辐射 电厂',ansYes('有关。冷却塔下方储存着放射性废料——和洞穴中上帝粒子产生了反应,创造了时间旅行条件。')),
],
tl:['米克尔在森林中失踪','米克尔穿越到1986年','他在1986年长大改名为米夏埃尔','米夏埃尔结婚生下乔纳斯','乔纳斯穿越回2019年寻找父亲'],
ans:'男孩不是来自2019年——他来自2052年。他是米克尔的儿子。<b>乔纳斯·卡恩瓦尔德</b>。米克尔在2019年失踪后穿越到1986年,长大成人改名为米夏埃尔,和汉娜结婚,生下了乔纳斯。乔纳斯为了寻找父亲穿越了时间——自己就是那个穿着80年代衣服的男孩。'
});

P.push({
n:'第二案卷',t:'陌生人的信',
s:'<p>一个陌生人住在旅馆里。从不摘帽子,用围巾遮住下半张脸。出现在每个关键地点——米克尔失踪的森林、乌鸦洞口、核电站附近。</p><p>一天夜里他敲开一个16岁男孩的门,递来一封信:<em>"不要相信任何人。包括我。——乔纳斯"</em></p>',
chars:[{label:'陌生人',name:'成年乔纳斯',note:'永远戴着帽子围巾,脸上有烧伤疤痕'},{label:'收信人',name:'少年乔纳斯',note:'16岁,刚失去了父亲'},{label:'失踪者',name:'米克尔',note:'12岁失踪,16岁收信人的父亲(悖论)'}],
clues:[
w('陌生人是谁?','陌生人 乔纳斯 未来',ansYes('他就是乔纳斯本人——来自33年后的2052年。')),
w('他为什么回来?','为什么 目的 回来',ansYes('试图阻止时间循环——阻止米克尔失踪,阻止父亲自杀。但每次尝试都让时间线更固化。')),
w('他成功了吗?','成功 阻止 失踪',ansNo('没有。他的行动正是导致米克尔跑进森林的原因。越想改变越是循环的一部分。')),
e('那封信是真的吗?','信 真的',ansYes('是的。信是他写给16岁的自己的——在警告自己不要走上同样的路。')),
e('他脸上有伤疤吗?','脸 伤疤',ansYes('有。脸上和脖子上有严重伤痕——多次时间旅行中辐射烧伤的结果。')),
pl('他能离开温登吗?','离开 温登 逃脱',ansNo('不能。温登是时间闭环——所有试图离开的人最终都会被时间拽回来。')),
pl('循环从什么时候开始?','循环 开始 起源',ansYes('真正起源是1888年——钟表匠坦豪斯为了复活儿子制造了时间机器。')),
],
tl:['米克尔失踪','少年乔纳斯失去父亲','成年乔纳斯从未来穿越回来','成年乔纳斯写信警告16岁的自己','警告失败——少年乔纳斯仍然走上了同一条路'],
ans:'陌生人是<b>成年乔纳斯</b>——来自2052年。他穿越回2019年试图阻止悲剧循环。但讽刺的是:他的每一次干预都在无意中确保时间线按既定轨迹运行。他给少年乔纳斯的警告信没有阻止任何事——只是让少年更早踏上了成为陌生人的道路。'
});

P.push({
n:'第三案卷',t:'小镇牧师的笔记本',
s:'<p>镇上来了新牧师诺亚。黑衣,轻声细语,眼神令人不寒而栗。他在教堂地下室藏了一本笔记本——写满人名和日期。</p><p><em>每个日期都在未来。</em>每个被写下名字的人都在标注的那天死了。</p>',
chars:[{label:'黑衣牧师',name:'诺亚',note:'来自2041年,为亚当工作'},{label:'幕后操纵者',name:'亚当',note:'老年乔纳斯,诺亚的主人'},{label:'笔记本前任持有者',name:'克劳迪娅',note:'核电站站长,与亚当对抗'},{label:'诺亚的妻子',name:'伊丽莎白',note:'聋哑女孩,后来杀死了诺亚'}],
clues:[
w('诺亚是谁?','诺亚 未来',ansYes('他来自2041年——亚当派来的,在三个时间线之间穿梭。')),
w('他为什么杀人?','为什么 杀 动机',ansYes('诺亚相信自己在做上帝的工作。被亚当洗脑——被骗了。')),
w('诺亚的结局?','结局 死',ansYes('被自己的妹妹/妻子伊丽莎白用枪打死。临死前才意识到被骗。笔记本上最后一个名字是他自己。')),
e('笔记本记录了所有人的死期?','笔记本 记录 名单',ansYes('记录了循环中每个人物的死亡日期——不是预言而是已知历史。诺亚来自未来,他知道一切。')),
e('谁写的笔记本?','谁写 来源',ansYes('循环中不断传递——原始作者已无法确定。诺亚从克劳迪娅那里得到的。笔记本本身就是一个时间悖论。')),
pl('他在哪里作案?','教堂 地下室',ansYes('教堂地下有一个秘密房间——诺亚在那里执行实验,也在那里存放笔记本。')),
],
tl:['诺亚从2041年来到温登','他按照笔记本上的名单暗杀','笔记本从克劳迪娅手中传到诺亚手中','诺亚被亚当欺骗','伊丽莎白用枪杀死诺亚'],
ans:'诺亚是亚当的时间旅人行刑者。他在三个时间线间穿梭,按照笔记本执行暗杀。笔记本不是预言——是<b>事后的记录</b>。因为诺亚来自未来,他知道每个人什么时候会死。但他不知道——笔记本上最后一个名字,是他自己。'
});

P.push({
n:'第四案卷',t:'1986年的男孩',
s:'<p>1986年。一个从未见过的男孩在森林里游荡。没有证件,说话方式陌生。警官伊根收留了他。男孩说他叫米克尔,来自温登——但户籍上没有他。他描述的家在1986年不存在。</p><p>他在1986年长大。改了名字——<em>米夏埃尔·卡恩瓦尔德。</em>和汉娜结了婚。</p>',
chars:[{label:'穿越的男孩',name:'米克尔→米夏埃尔',note:'来自2019年,在1986年长大'},{label:'收养他的警官',name:'伊根',note:'温登警察,克劳迪娅的父亲'},{label:'米夏埃尔的妻子',name:'汉娜',note:'后来生下了乔纳斯'},{label:'他们的儿子',name:'乔纳斯',note:'米夏埃尔和汉娜的孩子,2019年16岁'}],
clues:[
w('米克尔是2019年失踪的那个吗?','2019 失踪 穿越',ansYes('是的。2019年11月他在森林里跌入洞穴,穿越到了33年前的1986年。')),
w('汉娜知道他的真实身份吗?','汉娜 知道 身份',ansYes('不知道。汉娜只是爱上了一个安静的画画的男孩。多年后在乔纳斯房间里发现了日记。')),
w('他后来怎么样了?','后来 结局 死',ansYes('米克尔——米夏埃尔——在2019年夏天自杀了。他看到了12岁的自己从森林里跑出来。无法承受这个悖论。')),
e('他为什么改名?','改名 米夏埃尔',ansYes('没人相信他来自未来。被一户姓卡恩瓦尔德的护士家庭收养。改了名字才能活下去。')),

// Helper functions for clue creation
function ansYes(a){return a}
function ansNo(a){return a}
function ansIrrelevant(a){return a}

//==================== ENGINE ====================
var puzzleIdx=0,foundClues=[],actLeft=5,tlSolved=false,totalHints=0;

function enterGame(){
totalHints=0;
document.getElementById('ns').style.display='none';
document.getElementById('gm').style.display='block';
document.getElementById('cs').style.display='none';
puzzleIdx=0;loadPuzzle();
}

function loadPuzzle(){
foundClues=[];actLeft=5;tlSolved=false;
var p=P[puzzleIdx];
document.getElementById('pt').textContent='温登调查档案';
document.getElementById('pl').textContent='案卷 '+(puzzleIdx+1)+'/'+P.length;
document.getElementById('pnum').textContent=p.n;
document.getElementById('ptitle').textContent=p.t;
document.getElementById('bowl').innerHTML=p.s;
document.getElementById('clues').innerHTML='';
document.getElementById('clueCount').textContent='0';
document.getElementById('invCount').textContent=actLeft;
document.getElementById('reveal').style.display='none';
document.getElementById('btnNext').style.display='none';
document.getElementById('btnPrev').style.display=puzzleIdx>0?'block':'none';
document.getElementById('tlSection').classList.remove('active');
document.getElementById('tlResult').innerHTML='';
document.getElementById('charToggle').textContent='▸ 查看涉案人物 ('+p.chars.length+'人)';
document.getElementById('charPanel').innerHTML='';
document.getElementById('charPanel').classList.remove('open');
renderChars();renderInvButtons();updateProgress();
}

function toggleChars(){
document.getElementById('charPanel').classList.toggle('open');
}

function renderChars(){
var p=P[puzzleIdx],h='';
for(var i=0;i<p.chars.length;i++){
var c=p.chars[i];
h+='<div class="char-row"><span class="char-label">'+c.label+'</span><span class="char-name">'+c.name+'</span><span class="char-note">'+c.note+'</span></div>';
}
document.getElementById('charPanel').innerHTML=h;
}

function renderInvButtons(){
var p=P[puzzleIdx];
var witnessCount=0,evidenceCount=0,placeCount=0;
for(var i=0;i<p.clues.length;i++){
var c=p.clues[i];if(foundClues.indexOf(c)>=0)continue;
if(c.t==='witness')witnessCount++;
else if(c.t==='evidence')evidenceCount++;
else if(c.t==='place')placeCount++;
}
var disabled=(actLeft<=0||tlSolved)?' used':'';
var h='';
h+='<button class="inv-btn'+disabled+'" onclick="investigate(\'witness\')"><span class="ico">\uD83D\uDDE3</span><span class="lbl">询问证人 ('+witnessCount+')</span></button>';
h+='<button class="inv-btn'+disabled+'" onclick="investigate(\'evidence\')"><span class="ico">\uD83D\uDCCB</span><span class="lbl">检查证物 ('+evidenceCount+')</span></button>';
h+='<button class="inv-btn'+disabled+'" onclick="investigate(\'place\')"><span class="ico">\uD83D\uDDFA</span><span class="lbl">勘察地点 ('+placeCount+')</span></button>';
h+='</div><button class="btn" style="padding:6px 16px;font-size:11px;letter-spacing:2px;border-color:var(--border);color:var(--text-dim);margin-top:4px" onclick="showTimeline()">▸ 进入时间线重组</button>';
document.getElementById('invActions').innerHTML=h;
}

function investigate(type){
if(actLeft<=0||tlSolved)return;
var p=P[puzzleIdx];
var available=[];
for(var i=0;i<p.clues.length;i++){
var c=p.clues[i];if(foundClues.indexOf(c)>=0)continue;
if(c.t===type)available.push(c);
}
if(available.length===0)return;
actLeft--;
var clue=available[Math.floor(Math.random()*available.length)];
foundClues.push(clue);
renderClues();
renderInvButtons();
document.getElementById('invCount').textContent=actLeft;
document.getElementById('clueCount').textContent=foundClues.length;
// Show timeline when actions run out OR all clues are found
var allFound=true;
for(var i=0;i<p.clues.length;i++){if(foundClues.indexOf(p.clues[i])<0){allFound=false;break}}
if(actLeft<=0||allFound){
if(!allFound&&actLeft>0)actLeft=0;
showTimeline();
}
}

function renderClues(){
var h='';
for(var i=0;i<foundClues.length;i++){
var c=foundClues[i];
var tag='';
if(c.a==='yes')tag='<span class="clue-tag yes">是</span>';
else if(c.a==='no')tag='<span class="clue-tag no">否</span>';
else tag='<span class="clue-tag irrelevant">复杂</span>';
var typeLabel='';
if(c.t==='witness')typeLabel='[证人] ';
else if(c.t==='evidence')typeLabel='[证物] ';
else typeLabel='[地点] ';
h+='<div class="clue"><div>'+typeLabel+tag+c.q+'</div><div style="font-size:14px;color:#b8a890;margin-top:4px">'+c.ans+'</div></div>';
}
document.getElementById('clues').innerHTML=h;
var p=P[puzzleIdx];
document.getElementById('clueCount').textContent=foundClues.length+'/'+p.clues.length;
}

function showTimeline(){
tlSolved=false;
var p=P[puzzleIdx];
// Shuffle timeline events
var events=p.tl.slice();
for(var i=events.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=events[i];events[i]=events[j];events[j]=tmp}
// Render
var h='';
for(var i=0;i<events.length;i++){
h+='<div class="tl-item" draggable="true" data-index="'+i+'"><span class="tl-num">◇</span>'+events[i]+'</div>';
}
document.getElementById('tlContainer').innerHTML=h;
document.getElementById('tlSection').classList.add('active');
document.getElementById('tlResult').innerHTML='';
// Set up drag and drop
setupDragDrop();
}

function setupDragDrop(){
var items=document.querySelectorAll('.tl-item');
var container=document.getElementById('tlContainer');
items.forEach(function(item){
item.addEventListener('dragstart',function(e){
e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain','');this.classList.add('dragging');
});
item.addEventListener('dragend',function(){this.classList.remove('dragging')});
item.addEventListener('dragover',function(e){e.preventDefault();e.dataTransfer.dropEffect='move';this.classList.add('drag-over')});
item.addEventListener('dragleave',function(){this.classList.remove('drag-over')});
item.addEventListener('drop',function(e){
e.preventDefault();
var dragging=document.querySelector('.tl-item.dragging');
if(!dragging||dragging===this)return;
var allItems=Array.from(document.querySelectorAll('.tl-item'));
var dragIdx=allItems.indexOf(dragging);
var dropIdx=allItems.indexOf(this);
if(dragIdx<dropIdx){
container.insertBefore(dragging,this.nextSibling);
}else{
container.insertBefore(dragging,this);
}
this.classList.remove('drag-over');
});
});
}

function checkTimeline(){
if(tlSolved)return;
var p=P[puzzleIdx];
var items=document.querySelectorAll('.tl-item');
var correct=true;
for(var i=0;i<items.length;i++){
if(items[i].textContent.replace('◇','').trim()!==p.tl[i].trim()){correct=false;break}
}
if(correct){
tlSolved=true;
document.getElementById('tlResult').innerHTML='<span class="tl-result correct">✓ 时间线正确。你理解了——时间不是一个箭头。</span>';
showAnswer();
}else{
document.getElementById('tlResult').innerHTML='<span class="tl-result wrong">✗ 排序不对。</span> <button class="btn" style="padding:6px 16px;font-size:11px;letter-spacing:2px;border-color:var(--border);color:var(--text-dim)" onclick="showAnswer()">直接查看结论</button>';
}
}

function showAnswer(){
tlSolved=true;
var p=P[puzzleIdx];
document.getElementById('reveal').innerHTML=p.ans;
document.getElementById('reveal').style.display='block';
document.getElementById('btnNext').style.display='block';
document.getElementById('invActions').innerHTML='';
document.getElementById('reveal').scrollIntoView({behavior:'smooth'});
}

function nextPuzzle(){
if(puzzleIdx<P.length-1){puzzleIdx++;loadPuzzle();window.scrollTo(0,0)}
else{showComplete()}
}
function prevPuzzle(){
if(puzzleIdx>0){puzzleIdx--;loadPuzzle();window.scrollTo(0,0)}
}

function showComplete(){
document.getElementById('gm').style.display='none';
document.getElementById('cs').style.display='block';
document.getElementById('statsBox').innerHTML='<p>你完成了温登全部调查档案。</p><p style="font-style:italic;color:var(--text-dim)">时间是一个圆。现在你也是这个圆的一部分了。</p>';
}

function updateProgress(){document.getElementById('pf').style.width=(puzzleIdx/P.length)*100+'%';}
function restartGame(){puzzleIdx=0;totalHints=0;document.getElementById('gm').style.display='none';document.getElementById('cs').style.display='none';document.getElementById('ns').style.display='flex';updateProgress()}

document.getElementById('btnGo').addEventListener('click',enterGame);
document.getElementById('btnRe').addEventListener('click',restartGame);
document.getElementById('btnPrev').addEventListener('click',prevPuzzle);
document.getElementById('btnNext').addEventListener('click',nextPuzzle);
</script>
</body>
